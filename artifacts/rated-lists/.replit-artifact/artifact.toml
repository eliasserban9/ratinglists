kind = "web"
previewPath = "/"
title = "Rated Lists"
version = "1.0.0"
id = "artifacts/rated-lists"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19779
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/rated-lists run dev"

[services.env]
PORT = "19779"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/rated-lists", "run", "build"]
publicDir = "artifacts/rated-lists/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
